[package]
name = "amaze"
description = "A maze generator"
keywords = ["maze", "maze-generator"]
categories = ["game-development", "simulation"]
authors = ["Markus Mayer <widemeadows@gmail.com>"]
homepage = "https://github.com/sunsided/amaze-rs"
repository = "https://github.com/sunsided/amaze-rs"
license = "EUPL-1.2 OR MIT OR Apache-2.0"
readme = "../README.md"
version = "0.2.0"
edition = "2024"
rust-version = "1.85.0"

[features]
default = ["renderers", "generators", "solvers", "representations"]

generators = [
    "generator-growing-tree",
    "generator-kruskal",
    "generator-eller",
    "generator-wilson",
    "generator-hunt-and-kill",
    "generator-sidewinder",
    "generator-binary-tree",
]
generator-growing-tree = []
generator-kruskal = []
generator-eller = []
generator-wilson = []
generator-hunt-and-kill = []
generator-sidewinder = []
generator-binary-tree = []

solvers = ["solver-bfs", "solver-dfs", "solver-astar", "solver-dead-end"]
solver-bfs = []
solver-dfs = []
solver-astar = []
solver-dead-end = []

renderers = ["unicode-renderer", "pgm-renderer"]
unicode-renderer = []
pgm-renderer = []
representations = []
petgraph = ["dep:petgraph", "representations"]
serde = ["dep:serde"]

[dependencies]
rand = "^0.10.1"
serde = { version = "1", features = ["derive"], optional = true }
petgraph = { version = "0.8", optional = true }

[dev-dependencies]
indoc = "2.0.7"
criterion = "0.8"

[[bench]]
name = "generation"
harness = false
